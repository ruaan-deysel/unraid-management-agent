name: Release

# Releases are triggered three ways:
#   1. Auto-detect (push to main): when the VERSION file holds a version that
#      has no v<VERSION> tag yet AND CHANGELOG.md contains a matching
#      "## [<VERSION>] - <date>" heading, the workflow creates the tag and
#      release automatically. Bump VERSION + add the changelog section and the
#      release happens on push. No paths filter is used on purpose: the bump
#      and the changelog entry may land in separate commits, and the tag
#      existence check makes the detection idempotent either way.
#   2. Tag push (v*): the classic manual flow still works.
#   3. workflow_dispatch: optional tag input; left empty it falls back to the
#      VERSION file (same checks as auto-detect).
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v2025.12.1). Leave empty to release the version in the VERSION file."
        required: false
        type: string
        default: ""

permissions:
  contents: write

# Never run two releases at once (e.g. a tag push racing the auto-detection).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect:
    name: Detect Release
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
      tag: ${{ steps.decide.outputs.tag }}
      version: ${{ steps.decide.outputs.version }}
      prerelease: ${{ steps.decide.outputs.prerelease }}
      checkout_ref: ${{ steps.decide.outputs.checkout_ref }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Decide whether to release
        id: decide
        run: |
          SHOULD_RELEASE="false"
          TAG=""
          VERSION=""
          CHECKOUT_REF="${GITHUB_SHA}"

          if [ "${{ github.event_name }}" == "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Classic flow: a v* tag was pushed manually.
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
            CHECKOUT_REF="${GITHUB_REF}"
            SHOULD_RELEASE="true"
            echo "Trigger: tag push ($TAG)"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            # Manual dispatch with an explicit tag.
            TAG="${{ github.event.inputs.tag }}"
            VERSION=${TAG#v}
            CHECKOUT_REF="$TAG"
            SHOULD_RELEASE="true"
            echo "Trigger: workflow_dispatch ($TAG)"
          else
            # Auto-detect: push to main (or dispatch without a tag input).
            VERSION=$(tr -d '[:space:]' < VERSION)
            TAG="v$VERSION"
            echo "Trigger: auto-detect (VERSION file: $VERSION)"

            if [ -z "$VERSION" ]; then
              echo "::error::VERSION file is empty"
              exit 1
            fi

            # Guard 1: do not release a version that is already tagged.
            if git rev-parse -q --verify "refs/tags/$TAG" > /dev/null; then
              echo "Tag $TAG already exists — nothing to release."
            # Guard 2: require a matching changelog heading "## [VERSION] - <date>"
            # so a VERSION bump without release notes never ships silently.
            elif ! grep -qF "## [$VERSION] -" CHANGELOG.md; then
              echo "::warning::VERSION is $VERSION but CHANGELOG.md has no '## [$VERSION] - <date>' heading yet. Skipping release until the changelog entry lands."
            else
              SHOULD_RELEASE="true"
              echo "VERSION $VERSION is untagged and has a CHANGELOG entry — releasing."
            fi
          fi

          # Pre-release detection (date-based stable versions never match).
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          {
            echo "should_release=$SHOULD_RELEASE"
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "prerelease=$PRERELEASE"
            echo "checkout_ref=$CHECKOUT_REF"
          } >> "$GITHUB_OUTPUT"

          echo "should_release=$SHOULD_RELEASE tag=$TAG version=$VERSION prerelease=$PRERELEASE"

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.detect.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG_VERSION="${{ needs.detect.outputs.version }}"

          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

          echo "✅ VERSION file matches tag: $TAG_VERSION"

      - name: Install swag CLI
        run: |
          echo "Installing swag for Swagger documentation generation..."
          go install github.com/swaggo/swag/cmd/swag@latest
          echo "✅ swag installed"

      - name: Build release package
        run: |
          echo "Building release package..."
          make package

          # Verify the package was created
          PACKAGE_FILE="build/unraid-management-agent-${{ needs.detect.outputs.version }}.tgz"
          if [ ! -f "$PACKAGE_FILE" ]; then
            echo "ERROR: Package file not found: $PACKAGE_FILE"
            ls -la build/
            exit 1
          fi

          echo "✅ Package created: $PACKAGE_FILE"
          ls -lh "$PACKAGE_FILE"

      - name: Calculate MD5 checksum
        id: checksum
        run: |
          PACKAGE_FILE="build/unraid-management-agent-${{ needs.detect.outputs.version }}.tgz"

          # Calculate MD5 checksum (Linux uses md5sum, macOS uses md5)
          if command -v md5sum &> /dev/null; then
            MD5=$(md5sum "$PACKAGE_FILE" | awk '{print $1}')
          else
            MD5=$(md5 -q "$PACKAGE_FILE")
          fi

          echo "md5=$MD5" >> $GITHUB_OUTPUT
          echo "✅ MD5 checksum: $MD5"

          # Save checksum to file for release notes
          echo "$MD5" > build/MD5SUM

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ needs.detect.outputs.version }}"

          # Extract this version's section body: everything between the
          # "## [VERSION]" heading and the next "## [" heading (or EOF when it
          # is the last/only section). Fixed-string matching — no regex
          # surprises from the dots in date-based versions.
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md)

          # Trim leading/trailing blank lines while preserving inner spacing.
          NOTES=$(printf '%s\n' "$NOTES" | sed -e '/./,$!d' | sed -e ':a' -e '/^\n*$/{$d;N;ba' -e '}')

          if [ -n "$NOTES" ]; then
            echo "✅ Extracted release notes for version $VERSION from CHANGELOG.md"
            printf '%s\n' "$NOTES" > build/RELEASE_NOTES.md
            {
              echo ""
              echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for the full history."
            } >> build/RELEASE_NOTES.md
          else
            echo "::warning::No release notes found for version $VERSION in CHANGELOG.md"
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." > build/RELEASE_NOTES.md
          fi

          # Add MD5 checksum to release notes
          {
            echo ""
            echo "---"
            echo ""
            echo "**MD5 Checksum:**"
            echo '```'
            echo "${{ steps.checksum.outputs.md5 }}  unraid-management-agent-$VERSION.tgz"
            echo '```'
          } >> build/RELEASE_NOTES.md

          cat build/RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # On auto-detect runs the tag does not exist yet; action-gh-release
          # creates it at target_commitish. On tag-push runs it already exists
          # and target_commitish is ignored.
          tag_name: ${{ needs.detect.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.detect.outputs.version }}
          body_path: build/RELEASE_NOTES.md
          files: |
            build/unraid-management-agent-${{ needs.detect.outputs.version }}.tgz
            build/MD5SUM
          prerelease: ${{ needs.detect.outputs.prerelease }}
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PLG files with MD5 hash
        run: |
          MD5="${{ steps.checksum.outputs.md5 }}"
          VERSION="${{ needs.detect.outputs.version }}"

          echo "Updating PLG file with MD5: $MD5"

          # Update root PLG file
          sed -i "s/<!ENTITY md5.*\".*\">/<!ENTITY md5         \"$MD5\">/" unraid-management-agent.plg

          echo "✅ Updated PLG file"

          # Verify updates
          echo "Root PLG MD5:"
          grep "ENTITY md5" unraid-management-agent.plg

      - name: Commit and push PLG updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are changes
          if git diff --quiet unraid-management-agent.plg; then
            echo "No changes to PLG file"
          else
            # Fetch and rebase on main to ensure we're up to date
            git fetch origin main
            git checkout main
            git pull origin main

            # Refresh the root PLG file with the final release MD5
            MD5="${{ steps.checksum.outputs.md5 }}"
            sed -i "s/<!ENTITY md5.*\".*\">/<!ENTITY md5         \"$MD5\">/" unraid-management-agent.plg

            git add unraid-management-agent.plg
            git commit -m "chore: update PLG MD5 hash for v${{ needs.detect.outputs.version }} [skip ci]"
            git push origin main
            echo "✅ Committed and pushed PLG update"
          fi

      - name: Release Summary
        run: |
          echo "## 🎉 v${{ needs.detect.outputs.version }} Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Package:** \`unraid-management-agent-${{ needs.detect.outputs.version }}.tgz\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**MD5 Checksum:** \`${{ steps.checksum.outputs.md5 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/v${{ needs.detect.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.detect.outputs.prerelease }}" == "true" ]; then
            echo "**Type:** Pre-release" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Type:** Stable release" >> $GITHUB_STEP_SUMMARY
          fi
